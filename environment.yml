name: DSIC
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
    # Core ML Framework
    - torch==2.1.2
    - torchvision==0.16.2
    - accelerate==1.1.1
    - transformers==4.46.3
    - safetensors==0.4.5
    
    # Stable Cascade / Architecture specific
    - einops==0.8.0
    - kornia==0.7.4
    - webdataset==0.2.100
    - albumentations==1.4.21
    
    # Image Processing & Utilities
    - opencv-python==4.10.0.84
    - pillow==11.0.0
    - numpy==1.26.4
    - scipy==1.14.1
    
    # Logging & Tracking
    - wandb==0.18.7
    - tqdm==4.67.0
